<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #00ff88;
      --error: #ff4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(0,229,255,0.06); top: -100px; right: -100px; }
    .orb2 { width: 350px; height: 350px; background: rgba(124,58,237,0.08); bottom: -80px; left: -80px; animation-delay: -4s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(20px, 30px) scale(1.05); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.05);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
      font-family: 'Space Mono', monospace;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,255,0.3); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg.error { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: var(--error); display: block; }
    .msg.success { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--success); display: block; }

    .success-screen {
      display: none;
      text-align: center;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .success-screen.show { display: block; }

    .check-circle {
      width: 72px; height: 72px;
      background: rgba(0,255,136,0.1);
      border: 2px solid var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .success-user {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .success-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.3);
      border-radius: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--success);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 12px;
    }

    .logout-btn {
      margin-top: 28px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--muted); color: var(--text); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Login Card -->
<div class="card" id="loginCard">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <span class="brand-name">FractalBot</span>
  </div>

  <h1>Iniciar sesión</h1>
  <p class="subtitle">// acceso al sistema</p>

  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email"/>
  </div>

  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Entrar</button>

  <div class="msg" id="msg"></div>
</div>

<!-- Success Card -->
<div class="card success-screen" id="successCard">
  <div class="check-circle">✓</div>
  <div class="success-title">Conectado exitosamente</div>
  <div class="success-user" id="successEmail"></div>
  <div class="success-badge">● sesión activa</div>
  <br>
  <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://upytqftigginepncmoth.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweXRxZnRpZ2dpbmVwbmNtb3RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzA5ODQsImV4cCI6MjA4OTA0Njk4NH0.3NonScZQ3UHdYRuiGRFctco-EWYaW32-A375Lqk33Xs';

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Verificar sesión existente al cargar
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showSuccess(session.user.email);

  window.login = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');

    msg.className = 'msg';
    msg.style.display = 'none';

    if (!email || !password) {
      showMsg('error', 'Por favor completa todos los campos.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verificando...';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    btn.disabled = false;
    btn.innerHTML = 'Entrar';

    if (error) {
      showMsg('error', 'Credenciales incorrectas. Verifica tu correo y contraseña.');
    } else {
      showSuccess(data.user.email);
    }
  };

  window.logout = async function() {
    await supabase.auth.signOut();
    document.getElementById('successCard').classList.remove('show');
    document.getElementById('successCard').style.display = 'none';
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  };

  function showSuccess(email) {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('successEmail').textContent = email;
    document.getElementById('successCard').style.display = 'block';
    document.getElementById('successCard').classList.add('show');
  }

  function showMsg(type, text) {
    const msg = document.getElementById('msg');
    msg.className = 'msg ' + type;
    msg.textContent = text;
  }

  // Soporte tecla Enter
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });
</script>

</body>
</html>
